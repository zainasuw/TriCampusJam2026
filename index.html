<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="utf-8"/>
    <title>Dating Simulation! It's a Romance, Not a Bug</title>
    <style>
        @font-face {
            font-family: "The Bold Font";
            src: url("./assets/fonts/TheBoldFont.ttf") format("truetype");
        }

        @font-face {
            font-family: "Roboto";
            src: url("./assets/fonts/Roboto-Regular.ttf") format("truetype");
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16/9;
            display: block;
            outline: none;
        }
    </style>

    <script type="text/javascript" src="core/assetmanager.js"></script>
    <script type="text/javascript" src="core/timer.js"></script>
    <script type="text/javascript" src="core/gameengine.js"></script>

    <script type="text/javascript" src="core/gameState.js"></script>

    <script type="text/javascript" src="assets/data/dialogue.js"></script>

    <script type="text/javascript" src="scenes/CharacterSheetScene.js"></script>
    <script type="text/javascript" src="scenes/SettingsScene.js"></script>
    <script type="text/javascript" src="scenes/EndingScene.js"></script>
    <script type="text/javascript" src="scenes/BootDayScene.js"></script>
    <script type="text/javascript" src="scenes/DialogueScene.js"></script>
    <script type="text/javascript" src="scenes/NameInputScene.js"></script>
    <script src="core/music.js"></script>
    <script type="text/javascript" src="./main.js"></script>
</head>
<body>
<canvas
        id="gameWorld"
        width="1920"
        height="1080"

></canvas>
