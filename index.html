<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dating Sim! — It's a Feature, Not a Bug</title>
    <style>
        @font-face {
            font-family: 'The Bold Font';
            src: url('./assets/fonts/TheBoldFont.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Roboto';
            src: url('./assets/fonts/Roboto-Regular.ttf') format('truetype');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16/9;
            display: block;
            /* No border, no background — canvas clears itself each frame */
        }
    </style>

    <script type="text/javascript" src="core/assetmanager.js"></script>
    <script type="text/javascript" src="core/timer.js"></script>
    <script type="text/javascript" src="core/gameengine.js"></script>
    <script type="text/javascript" src="core/util.js"></script>
    <script type="text/javascript" src="./main.js"></script>
</head>
<body>
<!--
    IMPORTANT: removed the inline style="background: white; border: 1px..."
    The canvas background is now controlled by what we draw each frame.
    The body behind it is black (#000).
-->
<canvas id="gameWorld" width="1920" height="1080" tabindex="0" autofocus></canvas>
</body>
</html>
